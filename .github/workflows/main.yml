name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: courseshelf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push Database Schema
        env:
          DATABASE_URL: postgresql://admin:password123@localhost:5432/courseshelf_test?schema=public
        run: npx prisma db push

      - name: Run Unit Tests
        env:
          CI: true
          DATABASE_URL: postgresql://admin:password123@localhost:5432/courseshelf_test?schema=public
        run: npm run test

      - name: Build Application
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run End-to-End Tests
        env:
          CI: true
          DATABASE_URL: postgresql://admin:password123@localhost:5432/courseshelf_test?schema=public
        run: npm run test:e2e